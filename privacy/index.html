<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stella Bot | سياسة الخصوصية</title>
    <link rel="icon" type="image/png" href="../logo.png">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Stella Bot | سياسة الخصوصية">
    <meta property="og:description" content="صفحة ستيلا بوت الرسمية">
    <meta property="og:image" content="../logo.png">
    <meta property="og:theme-color" content="#4d5caa">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">

    <style>
        :root {
            --bg-main: #f3f5fa;
            --bg-card: #ffffff;
            --text-title: #11131e;
            --text-body: #5f6674;
            --border: rgba(0, 0, 0, 0.05);
            --border-hover: rgba(77, 92, 170, 0.2);
            --primary: #4d5caa;
            --primary-glow: rgba(77, 92, 170, 0.06); 
            --nav-bg: rgba(243, 245, 250, 0.85);
            
            /* لون الوميض الخاص بالرابط المباشر */
            --highlight-bg: rgba(77, 92, 170, 0.09);
            --highlight-border: #4d5caa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.2s ease, transform 0.2s ease;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-body);
            overflow-x: hidden;
            position: relative;
        }

        .neon-glow-1 {
            position: absolute; top: -150px; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 700px; height: 700px; border-radius: 50%;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 75%);
            z-index: -1; pointer-events: none;
        }

        .material-symbols-rounded {
            font-family: 'Material Symbols Rounded' !important;
            font-weight: normal; font-style: normal; font-size: 24px; line-height: 1;
            display: inline-block; direction: ltr; -webkit-font-smoothing: antialiased;
        }

        nav {
            position: fixed; top: 0; left: 0; right: 0; height: 85px;
            background: var(--nav-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; z-index: 1000;
        }

        .logo {
            font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; gap: 10px; text-decoration: none;
        }

        .btn-back {
            background: transparent; color: var(--text-title); border: 1px solid var(--border);
            padding: 10px 18px; border-radius: 12px; text-decoration: none; font-weight: 600;
            display: flex; align-items: center; gap: 6px; font-size: 0.9rem;
        }
        .btn-back:hover { transform: translateY(-2px); border-color: var(--border-hover); }

        .doc-container {
            padding: 140px 5% 80px;
            max-width: 850px;
            margin: 0 auto;
        }

        .doc-header-box { text-align: center; margin-bottom: 30px; }
        .doc-header-box h1 { font-size: 2.4rem; font-weight: 700; color: var(--text-title); margin-bottom: 12px; }
        
        .badge-date {
            background: rgba(77, 92, 170, 0.05); border: 1px solid var(--border);
            padding: 8px 16px; border-radius: 100px; font-size: 0.85rem; font-weight: 600;
            color: var(--primary); display: inline-flex; align-items: center; gap: 8px;
        }

        .search-box-container {
            position: relative;
            margin-bottom: 30px;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 18px 50px 18px 20px;
            font-size: 1rem;
            font-weight: 500;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-title);
            outline: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.01);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 8px 25px rgba(77, 92, 170, 0.06);
        }

        .search-icon {
            position: absolute; top: 50%; right: 20px; transform: translateY(-50%);
            color: var(--text-body); pointer-events: none; font-size: 22px;
        }

        .no-results {
            text-align: center; padding: 40px; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: 16px; color: var(--text-body);
            font-size: 1.05rem; display: none;
        }

        .accordion-wrapper {
            display: flex; flex-direction: column; gap: 14px;
        }

        .dropdown-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.01);
            scroll-margin-top: 110px;
        }

        .dropdown-trigger {
            width: 100%; background: none; border: none; padding: 22px 24px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; text-align: right; position: relative;
        }
        .dropdown-card:hover { border-color: var(--border-hover); }

        .trigger-content { display: flex; align-items: center; gap: 16px; width: 85%; }
        
        .trigger-icon {
            width: 40px; height: 40px; background: rgba(77, 92, 170, 0.05);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            color: var(--primary); flex-shrink: 0;
        }

        .trigger-content h3 { font-size: 1.15rem; color: var(--text-title); font-weight: 600; }
        
        .actions-wrapper {
            display: flex; align-items: center; gap: 12px;
        }

        .btn-copy-link {
            background: rgba(0, 0, 0, 0.02); border: 1px solid var(--border);
            width: 34px; height: 34px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-body); cursor: pointer; z-index: 10;
        }
        .btn-copy-link:hover {
            color: var(--primary); background: rgba(77, 92, 170, 0.08); border-color: var(--border-hover);
        }

        .arrow-icon {
            color: var(--text-body);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dropdown-content {
            max-height: 0; overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.002));
        }

        .dropdown-body-text {
            padding: 0 24px 24px 24px; color: var(--text-body);
            font-size: 0.98rem; line-height: 1.8; text-align: justify;
            border-top: 1px solid rgba(0,0,0,0.01);
        }
        .dropdown-body-text ul { margin-right: 20px; margin-top: 10px; }
        .dropdown-body-text li { margin-bottom: 6px; }

        .dropdown-card.active .arrow-icon {
            transform: rotate(-180deg); color: var(--primary);
        }
        
        .dropdown-card.active {
            border-color: var(--primary);
            box-shadow: 0 8px 25px rgba(77, 92, 170, 0.06);
        }

        /* أنيميشن الوميض الفخم للبند القادم من الرابط المباشر */
        @keyframes targetHighlight {
            0% { 
                background-color: var(--bg-card); 
                border-color: var(--border);
            }
            20% { 
                background-color: var(--highlight-bg); 
                border-color: var(--highlight-border);
                box-shadow: 0 0 20px rgba(77, 92, 170, 0.15);
            }
            80% { 
                background-color: var(--highlight-bg); 
                border-color: var(--highlight-border);
                box-shadow: 0 0 20px rgba(77, 92, 170, 0.15);
            }
            100% { 
                background-color: var(--bg-card); 
                border-color: var(--primary);
                box-shadow: 0 8px 25px rgba(77, 92, 170, 0.06);
            }
        }
        
        .dropdown-card.highlighted {
            animation: targetHighlight 2.5s cubic-bezier(0.4, 0, 0.2, 1) 1;
        }

        footer { padding: 40px 5%; text-align: center; font-size: 0.9rem; color: var(--text-body); border-top: 1px solid var(--border); margin-top: 60px; }
        footer span { color: var(--text-title); font-weight: 600; }
    </style>
</head>
<body>
    <div class="neon-glow-1"></div>
    
    <nav>
        <a href="/" class="logo">
            <span class="material-symbols-rounded" style="font-size: 30px; color: var(--primary);">cyclone</span>
            <span style="color: var(--text-title)">Stella Bot</span>
        </a>
        <a href="/" class="btn-back">
            <span class="material-symbols-rounded" style="font-size: 18px;">arrow_forward</span>
            الرئيسية
        </a>
    </nav>

    <div class="doc-container">
        <div class="doc-header-box">
            <h1 style="margin-top: 15px;">سياسة الخصوصية</h1>
            <p style="font-size: 1.05rem; line-height: 1.6;">بيان واضح يوضح طبيعة البيانات التي يتعامل معها ستيلّا بوت وكيفية الحفاظ على أمن سيرفرك بالكامل تحت إدارة استوديو مزيج.</p>
        </div>

        <div class="search-box-container">
            <span class="material-symbols-rounded search-icon">search</span>
            <input type="text" id="search-input" class="search-input" placeholder="ابحث برقم البند، العنوان، أو محتوى السياسة...">
        </div>

        <div id="no-results-msg" class="no-results">
            <span class="material-symbols-rounded" style="font-size: 40px; color: var(--text-body); margin-bottom: 10px; display: block;">search_off</span>
            لم يتم العثور على أي بنود تطابق بحثك!
        </div>

        <div class="accordion-wrapper" id="privacy-dropdown-container"></div>
    </div>

    <footer>
        <p><span>Mazeej Studio</span> &copy; 2026</p>
    </footer>

    <script>
        // مصفوفة الخصوصية مع معرفات (IDs) نظيفة للروابط المباشرة
        const privacyData = [
            {
                id: "database", // الرابط بكون: /privacy#database
                icon: "database",
                title: "1. البيانات الأساسية المجمعة وحمايتها",
                desc: "لحماية خادمك وحفظ تقدم الأعضاء يقوم ستيلا بوت بتخزين الحد الادنى والضروري جداً من البيانات في قواعد بيانات مشفرة ومحمية بالكامل تحت إشراف ستوديو مزيج، وهذه البيانات تشمل التالي:",
                list: [
                    "ايدي حسابات الديسكورد الخاصة بالمستخدمين",
                    "ايدي سيرفر الديسكورد الذي يتواجد به البوت",
                    "سجلات التفاعل و نقاط الخبرة والمستويات لضمان عدم ضياعها"
                ]
            },
            {
                id: "logs", // الرابط بكون: /privacy#logs
                icon: "visibility_off",
                title: "2. معالجة رسائل السجلات",
                desc: "عند تفعيل أنظمة الحماية كالفلترة والرقابة او نظام السجلات كسجلات التذاكر مثلاً، يقوم البوت بقراءة الرسائل والاحداث الجارية داخل خادمك بألية المعالجة الفورية والمؤقتة، لصد الهجمات وتوجيه المحتوى، ونؤكد بشكل قاطع اننا لانحتفظ بهذه السجلات التي يتم تسجيلها إنما هي ترسل في قناة معينة داخل خادمك أنت فقط"
            },
            {
                id: "security", // الرابط بكون: /privacy#security
                icon: "share_off",
                title: "3. بند السرية التامة وحظر الأطراف الخارجية",
                desc: "يلتزم مطورو ستوديو مزيج التزاماً صارماً ومطلقاً بعدم بيع أو تأجير أو اعارة أو مشاركة أي بيانات أو احصائيات أو اعدادات تخص سيرفرك أو اعضائك مع أي طرف ثالث أو وجهة إعلانية أو اي مشروع أخر خارج مظلة ستوديو مزيج"
            },
            {
                id: "delete", // الرابط بكون: /privacy#delete
                icon: "delete_forever",
                title: "4. حق النسيان والحذف الشامل للبيانات",
                desc: "نحنُ نحترم خصوصيتك لابعد حد وفي حال قررت التوقف عن استخدام خدماتنا يحق لمالك الخادم او العضو طلب حذف شامل وتصفير كامل البيانات والسجلات المتعلقة بحسابه أو خادمه من قواعد بياناتنا السحابية، ويتم ذلك مباشرة عبر طلب الدعم الفني في الخادم الرسمي الخاص بنا"
            }
        ];

        function initPrivacy() {
            const container = document.getElementById('privacy-dropdown-container');
            if (!container) return;

            let html = '';
            privacyData.forEach((item, index) => {
                let listHtml = '';
                if (item.list && item.list.length > 0) {
                    listHtml = '<ul>';
                    item.list.forEach(li => { listHtml += `<li>${li}</li>`; });
                    listHtml += '</ul>';
                }

                html += `
                    <div class="dropdown-card" id="${item.id}" data-index="${index}" data-title="${item.title}" data-desc="${item.desc}" data-list="${item.list ? item.list.join(' ') : ''}">
                        <div class="dropdown-trigger">
                            <div class="trigger-content" onclick="toggleDropdown('${item.id}')">
                                <div class="trigger-icon">
                                    <span class="material-symbols-rounded">${item.icon}</span>
                                </div>
                                <h3>${item.title}</h3>
                            </div>
                            <div class="actions-wrapper">
                                <button class="btn-copy-link" title="نسخ الرابط المباشر للبند" onclick="copyDirectLink('${item.id}')">
                                    <span class="material-symbols-rounded" style="font-size: 18px;">share</span>
                                </button>
                                <span class="material-symbols-rounded arrow-icon" onclick="toggleDropdown('${item.id}')">expand_more</span>
                            </div>
                        </div>
                        <div class="dropdown-content" id="content-${item.id}">
                            <div class="dropdown-body-text">
                                <p>${item.desc}</p>
                                ${listHtml}
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;

            document.getElementById('search-input').addEventListener('input', filterTerms);
            checkUrlHash();
        }

        function toggleDropdown(id) {
            const card = document.getElementById(id);
            const content = document.getElementById(`content-${id}`);
            
            if (card.classList.contains('active')) {
                content.style.maxHeight = null;
                card.classList.remove('active');
            } else {
                document.querySelectorAll('.dropdown-card').forEach(c => c.classList.remove('active'));
                document.querySelectorAll('.dropdown-content').forEach(cnt => cnt.style.maxHeight = null);
                
                card.classList.add('active');
                content.style.maxHeight = content.scrollHeight + "px";
            }
        }

        function copyDirectLink(id) {
            const urlWithoutHash = window.location.href.split('#')[0];
            const directLink = `${urlWithoutHash}#${id}`;
            
            navigator.clipboard.writeText(directLink).then(() => {
                const btn = document.querySelector(`#${id} .btn-copy-link span`);
                btn.textContent = 'done';
                btn.style.color = '#2ec4b6';
                setTimeout(() => {
                    btn.textContent = 'share';
                    btn.style.color = '';
                }, 1500);
            }).catch(err => {
                console.error('فشل نسخ الرابط: ', err);
            });
        }

        function checkUrlHash() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const targetCard = document.getElementById(hash);
                if (targetCard) {
                    setTimeout(() => {
                        toggleDropdown(hash);
                        targetCard.scrollIntoView({ behavior: 'smooth' });
                        
                        targetCard.classList.add('highlighted');
                        
                        setTimeout(() => {
                            targetCard.classList.remove('highlighted');
                        }, 2500);
                    }, 400);
                }
            }
        }

        function filterTerms() {
            const searchVal = this.value.trim().toLowerCase();
            const cards = document.querySelectorAll('.dropdown-card');
            const noResultsMsg = document.getElementById('no-results-msg');
            let hasResults = false;

            cards.forEach(card => {
                const title = card.getAttribute('data-title').toLowerCase();
                const desc = card.getAttribute('data-desc').toLowerCase();
                const list = card.getAttribute('data-list').toLowerCase();

                if (title.includes(searchVal) || desc.includes(searchVal) || list.includes(searchVal)) {
                    card.style.display = 'block';
                    hasResults = true;
                } else {
                    card.style.display = 'none';
                    const content = card.querySelector('.dropdown-content');
                    content.style.maxHeight = null;
                    card.classList.remove('active');
                }
            });

            if (hasResults) {
                noResultsMsg.style.display = 'none';
            } else {
                noResultsMsg.style.display = 'block';
            }
        }

        initPrivacy();
    </script>
</body>
</html>
